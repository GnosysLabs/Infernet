name: Release desktop apps

on:
  workflow_dispatch:
  push:
    tags:
      - "app-v*"

permissions:
  actions: write
  contents: write

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon DMG
            runner: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg
            os: macos
          - name: Windows x64 NSIS setup
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
            os: windows

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: infernet-ui/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust builds
        uses: swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Install frontend dependencies
        run: npm ci --prefix infernet-ui

      - name: Validate release tag version
        if: startsWith(github.ref, 'refs/tags/app-v')
        run: node -e "const version=require('./infernet-ui/src-tauri/tauri.conf.json').version; if (process.env.GITHUB_REF_NAME !== 'app-v'+version) throw new Error('Tag '+process.env.GITHUB_REF_NAME+' does not match app-v'+version)"

      - name: Install CUDA toolkit for the Windows worker
        if: matrix.os == 'windows'
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: "12.9.1"
          method: network

      - name: Import Developer ID certificate
        if: matrix.os == 'macos'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          CERT_ID=$(security find-identity -v -p codesigning build.keychain | sed -n 's/.*"\(Developer ID Application:[^"]*\)".*/\1/p' | head -1)
          test -n "$CERT_ID"
          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"

      - name: Build and publish installers
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ matrix.os == 'macos' && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ matrix.os == 'macos' && secrets.APPLE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.os == 'macos' && '4PDUNTF69S' || '' }}
          INFERNET_LLAMA_BUILD_JOBS: "2"
          INFERNET_SD_BUILD_JOBS: "2"
          INFERNET_CUDA: ${{ matrix.os == 'windows' && 'ON' || 'OFF' }}
          INFERNET_CUDA_ARCHITECTURES: ${{ matrix.os == 'windows' && '75;86;89;120' || '' }}
        with:
          projectPath: infernet-ui
          tagName: app-v__VERSION__
          releaseName: Infernet v__VERSION__
          releaseBody: |
            Download the DMG on Apple Silicon Macs or the setup EXE on Windows.

            The Windows installer is intentionally unsigned. Choose “More info” and “Run anyway” in Microsoft Defender SmartScreen.
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

  cleanup:
    name: Remove previous desktop releases and builds
    needs: release
    if: success()
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Keep only the latest desktop release and workflow run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          current_tag="app-v$(jq -r '.version' infernet-ui/src-tauri/tauri.conf.json)"

          gh api --paginate "repos/${GITHUB_REPOSITORY}/releases?per_page=100" \
            --jq '.[] | select(.tag_name | startswith("app-v")) | .tag_name' |
          while read -r tag; do
            if [[ -n "$tag" && "$tag" != "$current_tag" ]]; then
              gh release delete "$tag" --repo "$GITHUB_REPOSITORY" --yes
            fi
          done

          gh api --paginate \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/release-desktop.yml/runs?status=completed&per_page=100" \
            --jq '.workflow_runs[].id' |
          while read -r run_id; do
            gh api --method DELETE "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}"
          done
