limit_req_zone $binary_remote_addr zone=infernet_location:10m rate=10r/m;

server {
    listen 80;
    listen [::]:80;
    server_name infernet.gnosyslabs.xyz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name infernet.gnosyslabs.xyz;

    ssl_certificate /etc/letsencrypt/live/infernet.gnosyslabs.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/infernet.gnosyslabs.xyz/privkey.pem;

    location = /.well-known/infernet/coarse-location {
        limit_req zone=infernet_location burst=5 nodelay;
        limit_except POST { deny all; }
        client_max_body_size 16k;
        proxy_pass http://127.0.0.1:9778;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_connect_timeout 3s;
        proxy_read_timeout 12s;
    }

    location / {
        return 404;
    }
}
